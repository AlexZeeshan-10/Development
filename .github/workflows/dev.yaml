# This is a GitHub Actions workflow that will run checks on your code.
# It's triggered on every push or pull request to your main branch.

name: Code Quality Check

# Controls when the workflow will run
on:
  push:
    branches: [ "**" ] # Run on pushes to all branches
  pull_request:
    branches: [ "main" ] # Run on PRs targeting the main branch
  workflow_dispatch: # Allow manual triggering from the Actions tab

jobs:
  # This job runs the Super-Linter
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out your repository code so the workflow can access it
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetches all history for all branches and tags.
          # This is required for the linter to perform a full analysis.
          fetch-depth: 0

      # Step 2: Run the Super-Linter action
      - name: Run Super-Linter
        uses: github/super-linter@v6
        env:
          # The GITHUB_TOKEN is automatically provided by GitHub
          # and is required for the linter to function correctly.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}