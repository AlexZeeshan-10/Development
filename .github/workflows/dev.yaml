name: Web dev CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  check-changed-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: Fetch history so git diff works
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linting Tools
        run: npm install -g prettier htmlhint eslint

      - name: Detect and Check Changed Web Files
        run: |
          # 1. Figure out what files changed based on if it's a PR or a Push
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} HEAD -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.css' '*.html')
          else
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.css' '*.html')
            else
              CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT ${{ github.event.before }} ${{ github.sha }} -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.css' '*.html')
            fi
          fi
          
          # 2. If nothing relevant changed, exit early and cleanly
          if [ -z "$CHANGED_FILES" ]; then
            echo "No web files changed. Skipping checks."
            exit 0
          fi

          # 3. Loop through the changed files safely (handling spaces in folder names)
          echo "$CHANGED_FILES" | while IFS= read -r file; do
              # Skip if the file is empty or was deleted
              if [ -z "$file" ] || [ ! -f "$file" ]; then continue; fi
              
              echo "--> Checking formatting for '$file'"
              prettier --check "$file"
              
              # Run HTMLHint for HTML files
              if [[ "$file" == *.html ]]; then
                echo "--> Checking HTML syntax for '$file'"
                htmlhint "$file"
              fi

              # Run ESLint for JS/TS files
              if [[ "$file" == *.js ]] || [[ "$file" == *.ts ]] || [[ "$file" == *.jsx ]] || [[ "$file" == *.tsx ]]; then
                echo "--> Checking JS/TS syntax for '$file'"
                eslint "$file"
              fi
              
          done
          echo "All changed files passed checks smoothly!"